# PZ Build 42.10.0 — OnCreate signature change for buildable tiles
# Source: https://pzwiki.net/wiki/Build_42.10.0

version: "42.10.0"
release_date: "2025-06-30"
summary: "OnCreate signature change for buildable tiles"
source: "https://pzwiki.net/wiki/Build_42.10.0"

changes:

  # --- ONCREATE SIGNATURE CHANGE ---

  - id: b42-10-oncreate-signature
    type: deprecated
    severity: warning
    since: "42.10.0"
    description: "OnCreate for buildable tiles now receives table {thumpable, craftrecipedata, character} instead of single object"
    pattern: "OnCreate"
    scan: "*.lua"
    context: "OnCreate signature changed in 42.10 — verify your OnCreate handlers accept a table"
    replacement: "function myOnCreate(args) local thumpable = args.thumpable; local data = args.craftrecipedata; local character = args.character end"
